<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Images\Logos\MiniLogo.jfif" type="png">
    <link rel="stylesheet" href="../CSS/cadastro.css">
    <title>Sing Up</title>
</head>
<h1 class="form-title">Criar Conta</h1>
<body>
    <div class="form-body">
        <form action="../PHP/cadastro.php" method="post" onsubmit="return validarFormulario()">
            <div class="form-group">
                <input type="text" class="form-control" id="user_n" name="user_n" placeholder="Username" required>
            </div>
            
            <div class="form-group">
                <input type="email" class="form-control" id="user_Email" name="user_Email" placeholder="Email" required>
            </div>
            
            <div class="form-group">
                <input type="password" class="form-control" id="user_pass" name="user_pass" placeholder="Password" required>
            </div>
            
            <div class="form-group">
                <input type="password" class="form-control" id="repeat_pass" name="repeat_pass" placeholder="Confirm Password" required oninput="verificarSenhas()">
                <p id="mensagemErro"></p>
            </div>
            
            <div class="form-check">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">I Agree To The Terms & Conditions</label>
            </div>
            
            <button type="submit" class="signup-btn">Sign Up</button>
            
            <div class="login-link">
                Já tem uma conta? Faça Login <a href="login_page.html">Login Now!</a>
            </div>
        </form>
    </div>
</div>

<div class="form-footer">
    © 2025 All rights reserved | Design by Gabriell Barbosa
</div>
</body>

<script>
    function verificarSenhas() {
        var senha = document.getElementById("user_pass").value;
        var confirmarSenha = document.getElementById("repeat_pass").value;
        var mensagemErro = document.getElementById("mensagemErro");

        if (senha !== confirmarSenha) {
            mensagemErro.textContent = "As senhas não coincidem!";
        } else {
            mensagemErro.textContent = "";
        }
    }

    function validarFormulario() {
        var senha = document.getElementById("user_pass").value;
        var confirmarSenha = document.getElementById("repeat_pass").value;

        if (senha !== confirmarSenha) {
            alert("Erro: As senhas não coincidem!");
            return false; // Impede o envio do formulário
        }
        return true; // Permite o envio
    }
</script>
</html>
